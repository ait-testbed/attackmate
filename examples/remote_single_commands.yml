# Authors: Erik Grafendorfer
# Description:
#   This playbook runs a single command on a remote attackmate-api-server.
#
#   See:
#   docs/source/playbook/commands/remote.rst

# Requirements:
#     1. One attackmate instance configured as api-server
#     2. One attackmate instance configured as client
#
#     See:
#     docs/source/configuration/remote_config.rst
#     
commands:
  - type: remote
    cmd: execute_command
    connection: primary_node
    remote_command:
      type: shell
      cmd: hostname
